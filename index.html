<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 게임 — 실전 기술적 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#0f0f0f;color:#e0e0e0;min-height:100vh;padding:12px}
.gw{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.top-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.metric{background:#1a1a1a;border-radius:8px;padding:8px 12px;border:0.5px solid #2a2a2a}
.metric .lbl{font-size:11px;color:#888;margin-bottom:3px}
.metric .val{font-size:16px;font-weight:500;color:#e0e0e0}
.up{color:#1D9E75!important}.down{color:#E24B4A!important}
.chart-box{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:12px;padding:12px}
.chart-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tbtn{padding:3px 9px;border-radius:6px;border:0.5px solid #333;font-size:11px;cursor:pointer;background:transparent;color:#888}
.tbtn:hover{background:#252525;color:#e0e0e0}
.tbtn.active{background:#252525;color:#e0e0e0;font-weight:500;border-color:#555}
.tsep{width:0.5px;background:#2a2a2a;height:18px;align-self:center}
.badge{display:inline-block;background:#1a3a5c;color:#6ab0f5;font-size:11px;padding:2px 8px;border-radius:6px;margin-left:6px}
.ct{font-size:11px;color:#666;margin-bottom:6px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sub-box{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:8px;padding:8px}
.sub-lbl{font-size:11px;color:#666;margin-bottom:4px}
.info-box{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:8px;padding:8px 14px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.info-item{font-size:12px;color:#888}
.info-item b{font-weight:500;color:#e0e0e0}
.order-panel{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.order-side{border-radius:12px;border:0.5px solid #2a2a2a;padding:12px;background:#1a1a1a}
.side-title{font-size:12px;font-weight:500;margin-bottom:10px}
.buy-title{color:#1D9E75}.sell-title{color:#E24B4A}
.tab-row{display:flex;gap:4px;margin-bottom:10px}
.tab{padding:4px 10px;border-radius:6px;border:0.5px solid #333;font-size:11px;cursor:pointer;background:transparent;color:#888}
.tab.active{background:#252525;color:#e0e0e0;font-weight:500}
.field-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.field-row label{font-size:11px;color:#888;min-width:32px}
.field-row input{flex:1;height:30px;padding:0 8px;border-radius:6px;border:0.5px solid #444;background:#111;color:#e0e0e0;font-size:12px}
.field-row input:focus{outline:none;border-color:#378ADD}
.field-row .unit{font-size:11px;color:#888;min-width:18px}
.pct-row{display:flex;gap:4px;margin-bottom:8px}
.pct-btn{flex:1;padding:4px 0;border-radius:6px;border:0.5px solid #333;font-size:11px;cursor:pointer;background:transparent;color:#888}
.pct-btn:hover{background:#252525;color:#e0e0e0}
.summary-row{display:flex;justify-content:space-between;font-size:11px;color:#666;padding:3px 0;border-top:0.5px solid #2a2a2a}
.summary-row span:last-child{color:#e0e0e0;font-weight:500}
.exec-btn{width:100%;margin-top:8px;padding:9px;border-radius:6px;border:none;font-size:13px;font-weight:500;cursor:pointer}
.buy-btn{background:#1D9E75;color:#fff}.buy-btn:hover{background:#0F6E56}
.sell-btn{background:#E24B4A;color:#fff}.sell-btn:hover{background:#A32D2D}
.exec-btn:disabled{opacity:0.35;cursor:not-allowed}
.next-row{display:flex;justify-content:center;padding:2px 0}
.next-btn{padding:8px 28px;border-radius:8px;border:0.5px solid #444;background:#1a1a1a;color:#e0e0e0;font-size:13px;font-weight:500;cursor:pointer}
.next-btn:hover{background:#252525}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spin{width:32px;height:32px;border:2px solid #2a2a2a;border-top-color:#378ADD;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stock-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stock-card{padding:14px;border-radius:8px;border:0.5px solid #2a2a2a;cursor:pointer;background:#1a1a1a;transition:background 0.15s}
.stock-card:hover{background:#252525;border-color:#444}
.stock-card .sname{font-size:13px;font-weight:500;color:#e0e0e0}
.stock-card .ssector{font-size:11px;color:#666;margin-top:4px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1a1a;border-radius:12px;padding:24px;width:90%;max-width:440px;border:0.5px solid #333}
.modal h2{font-size:18px;font-weight:500;margin-bottom:16px;text-align:center;color:#e0e0e0}
.modal-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #2a2a2a;font-size:13px;color:#e0e0e0}
.tlog{max-height:100px;overflow-y:auto;margin-top:10px;font-size:11px;color:#888}
.tlog div{padding:3px 0;border-bottom:0.5px solid #2a2a2a}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:center}
.shake{animation:shk 0.4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
h1{font-size:16px;font-weight:500;color:#e0e0e0;padding:4px 0 8px}
.ma-legend{display:flex;gap:10px;font-size:11px;color:#888}
.ma-dot{width:12px;height:2px;border-radius:1px;display:inline-block;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div class="gw" id="gw">
  <h1>투자 게임 — 실전 기술적 분석</h1>

  <div id="loadingScreen" class="loading-screen">
    <div class="spin"></div>
    <div style="font-size:13px;color:#888" id="loadingMsg">라이브러리 로딩 중...</div>
    <div style="font-size:11px;color:#555" id="loadingDetail"></div>
  </div>

  <div id="stockSelectScreen" style="display:none">
    <div style="font-size:15px;font-weight:500;color:#e0e0e0;margin-bottom:4px">종목 선택</div>
    <div style="font-size:12px;color:#888">블라인드 모드 — 업종 힌트만 표시됩니다</div>
    <div class="stock-select-grid" id="stockSelectGrid"></div>
  </div>

  <div id="gameScreen" style="display:none">
    <div class="top-bar">
      <div class="metric"><div class="lbl">보유 현금</div><div class="val" id="cashEl">₩1,000,000</div></div>
      <div class="metric"><div class="lbl">평가 자산</div><div class="val" id="totalEl">₩1,000,000</div></div>
      <div class="metric"><div class="lbl">수익률</div><div class="val" id="retEl">0.00%</div></div>
      <div class="metric"><div class="lbl">진행</div><div class="val" id="progEl">1 / 10</div></div>
    </div>

    <div class="chart-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div class="ct" id="chartTitle">블라인드 모드</div>
        <button class="tbtn" onclick="goSelectStock()">↺ 종목 변경</button>
      </div>
      <div class="chart-toolbar">
        <div style="display:flex;gap:3px" id="periodBtns">
          <button class="tbtn active" data-period="1" onclick="setPeriod(1)">일봉</button>
          <button class="tbtn" data-period="5" onclick="setPeriod(5)">주봉</button>
          <button class="tbtn" data-period="20" onclick="setPeriod(20)">월봉</button>
        </div>
        <div class="tsep"></div>
        <div style="display:flex;gap:3px" id="maBtns">
          <button class="tbtn active" data-ma="5" onclick="toggleMA(5)">MA5</button>
          <button class="tbtn active" data-ma="20" onclick="toggleMA(20)">MA20</button>
          <button class="tbtn active" data-ma="60" onclick="toggleMA(60)">MA60</button>
        </div>
        <div class="tsep"></div>
        <div class="ma-legend">
          <span><span class="ma-dot" style="background:#FAC775"></span>MA5</span>
          <span><span class="ma-dot" style="background:#85B7EB"></span>MA20</span>
          <span><span class="ma-dot" style="background:#F09595"></span>MA60</span>
        </div>
        <span style="margin-left:auto;font-size:10px;color:#555">스크롤로 줌 / 드래그로 이동</span>
      </div>
      <div id="mainChart" style="width:100%;height:320px"></div>
    </div>

    <div class="sub-grid">
      <div class="sub-box"><div class="sub-lbl">거래량</div><div id="volChart" style="width:100%;height:90px"></div></div>
      <div class="sub-box"><div class="sub-lbl">RSI (14)</div><div id="rsiChart" style="width:100%;height:90px"></div></div>
      <div class="sub-box"><div class="sub-lbl">MACD</div><div id="macdChart" style="width:100%;height:90px"></div></div>
    </div>

    <div class="info-box">
      <div class="info-item">현재가: <b id="inf-price">—</b></div>
      <div class="info-item">날짜: <b id="inf-date">—</b></div>
      <div class="info-item">고가: <b id="inf-h">—</b></div>
      <div class="info-item">저가: <b id="inf-l">—</b></div>
      <div class="info-item">RSI: <b id="inf-rsi">—</b></div>
      <div class="info-item">MA20: <b id="inf-ma20">—</b></div>
      <div class="info-item">평균매입가: <b id="inf-avg">—</b></div>
      <div class="info-item">보유: <b id="inf-shares">0주</b></div>
    </div>

    <div class="order-panel">
      <div class="order-side">
        <div class="side-title buy-title">매수</div>
        <div class="tab-row">
          <button class="tab active" id="buyTabQty" onclick="setTab('buy','qty')">수량</button>
          <button class="tab" id="buyTabAmt" onclick="setTab('buy','amt')">금액</button>
        </div>
        <div class="field-row">
          <label id="buyLabel">수량</label>
          <input type="number" id="buyInput" min="0" step="1" placeholder="0" oninput="onOrderInput('buy')"/>
          <span class="unit" id="buyUnit">주</span>
        </div>
        <div class="pct-row">
          <button class="pct-btn" onclick="setPct('buy',25)">25%</button>
          <button class="pct-btn" onclick="setPct('buy',50)">50%</button>
          <button class="pct-btn" onclick="setPct('buy',75)">75%</button>
          <button class="pct-btn" onclick="setPct('buy',100)">최대</button>
        </div>
        <div class="summary-row"><span>주문 수량</span><span id="buySummaryQty">0주</span></div>
        <div class="summary-row"><span>주문 금액</span><span id="buySummaryAmt">₩0</span></div>
        <div class="summary-row"><span>주문 후 잔액</span><span id="buySummaryLeft">—</span></div>
        <button class="exec-btn buy-btn" id="execBuy" onclick="execOrder('buy')" disabled>매수 실행</button>
      </div>
      <div class="order-side">
        <div class="side-title sell-title">매도</div>
        <div class="tab-row">
          <button class="tab active" id="sellTabQty" onclick="setTab('sell','qty')">수량</button>
          <button class="tab" id="sellTabAmt" onclick="setTab('sell','amt')">금액</button>
        </div>
        <div class="field-row">
          <label id="sellLabel">수량</label>
          <input type="number" id="sellInput" min="0" step="1" placeholder="0" oninput="onOrderInput('sell')"/>
          <span class="unit" id="sellUnit">주</span>
        </div>
        <div class="pct-row">
          <button class="pct-btn" onclick="setPct('sell',25)">25%</button>
          <button class="pct-btn" onclick="setPct('sell',50)">50%</button>
          <button class="pct-btn" onclick="setPct('sell',75)">75%</button>
          <button class="pct-btn" onclick="setPct('sell',100)">전량</button>
        </div>
        <div class="summary-row"><span>주문 수량</span><span id="sellSummaryQty">0주</span></div>
        <div class="summary-row"><span>주문 금액</span><span id="sellSummaryAmt">₩0</span></div>
        <div class="summary-row"><span>보유 수량</span><span id="sellSummaryHolding">0주</span></div>
        <button class="exec-btn sell-btn" id="execSell" onclick="execOrder('sell')" disabled>매도 실행</button>
      </div>
    </div>

    <div class="next-row">
      <button class="next-btn" onclick="nextStep()">홀딩 — 다음 시점으로 →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <h2 id="modalTitle">게임 종료</h2>
    <div id="modalBody"></div>
    <div class="modal-btns">
      <button class="next-btn" onclick="goSelectStock()">다른 종목 도전</button>
      <button class="next-btn" onclick="restartSameStock()">재도전</button>
    </div>
  </div>
</div>

<script>
const BASE_URL='https://einsteindha.github.io/stock-game-data/';
const orderMode={buy:'qty',sell:'qty'};
let stockIndex=[],stockData=null,state={};
let mainChart=null,volChart=null,rsiChart=null,macdChart=null;
let candleSeries=null,ma5Series=null,ma20Series=null,ma60Series=null;
let volSeries=null,rsiSeries=null,rsi70=null,rsi30=null;
let macdHist=null,macdLine=null,macdSig=null;
let periodSize=1;
const maVisible={5:true,20:true,60:true};

const DARK={layout:{background:{color:'#1a1a1a'},textColor:'#888'},
  grid:{vertLines:{color:'rgba(255,255,255,0.04)'},horzLines:{color:'rgba(255,255,255,0.04)'}},
  crosshair:{mode:1},
  rightPriceScale:{borderColor:'#2a2a2a'},
  timeScale:{borderColor:'#2a2a2a',timeVisible:true,secondsVisible:false}};

function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=src;s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
}

async function init(){
  try{
    document.getElementById('loadingMsg').textContent='차트 라이브러리 로딩 중...';
    await loadScript('https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js');
    document.getElementById('loadingMsg').textContent='종목 목록 불러오는 중...';
    const res=await fetch(BASE_URL+'index.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    stockIndex=await res.json();
    showStockSelect();
  }catch(e){
    document.getElementById('loadingMsg').textContent='로드 실패 — 페이지를 새로고침해 주세요';
    document.getElementById('loadingDetail').textContent=e.message;
  }
}

function showStockSelect(){
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('resultModal').classList.remove('show');
  document.getElementById('stockSelectScreen').style.display='block';
  const grid=document.getElementById('stockSelectGrid');
  grid.innerHTML='';
  stockIndex.forEach(s=>{
    const div=document.createElement('div');
    div.className='stock-card';
    div.innerHTML=`<div class="sname">${s.sector}</div><div class="ssector">${s.total.toLocaleString()}일치 데이터</div>`;
    div.onclick=()=>loadStock(s);
    grid.appendChild(div);
  });
}

async function loadStock(info){
  document.getElementById('stockSelectScreen').style.display='none';
  document.getElementById('loadingScreen').style.display='flex';
  document.getElementById('loadingMsg').textContent=`${info.sector} 데이터 불러오는 중...`;
  document.getElementById('loadingDetail').textContent='';
  try{
    const res=await fetch(BASE_URL+info.file);
    if(!res.ok)throw new Error('HTTP '+res.status);
    stockData=await res.json();
    initGame();
  }catch(e){
    document.getElementById('loadingMsg').textContent='로드 실패 — 새로고침 후 다시 시도해 주세요';
    document.getElementById('loadingDetail').textContent=e.message;
  }
}

function goSelectStock(){document.getElementById('resultModal').classList.remove('show');destroyCharts();showStockSelect();}
function restartSameStock(){document.getElementById('resultModal').classList.remove('show');initGame();}

function destroyCharts(){
  [mainChart,volChart,rsiChart,macdChart].forEach(c=>{if(c)c.remove();});
  mainChart=volChart=rsiChart=macdChart=null;
  candleSeries=ma5Series=ma20Series=ma60Series=null;
  volSeries=rsiSeries=rsi70=rsi30=null;
  macdHist=macdLine=macdSig=null;
  ['mainChart','volChart','rsiChart','macdChart'].forEach(id=>document.getElementById(id).innerHTML='');
}

function buildCharts(){
  destroyCharts();
  mainChart=LightweightCharts.createChart(document.getElementById('mainChart'),{...DARK,height:320,handleScroll:true,handleScale:true});
  candleSeries=mainChart.addCandlestickSeries({upColor:'#1D9E75',downColor:'#E24B4A',borderUpColor:'#1D9E75',borderDownColor:'#E24B4A',wickUpColor:'#1D9E75',wickDownColor:'#E24B4A'});
  ma5Series=mainChart.addLineSeries({color:'#FAC775',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  ma20Series=mainChart.addLineSeries({color:'#85B7EB',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  ma60Series=mainChart.addLineSeries({color:'#F09595',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});

  const subOpts={...DARK,height:90,handleScroll:false,handleScale:false,timeScale:{...DARK.timeScale,visible:false}};
  volChart=LightweightCharts.createChart(document.getElementById('volChart'),subOpts);
  volSeries=volChart.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});

  rsiChart=LightweightCharts.createChart(document.getElementById('rsiChart'),subOpts);
  rsiSeries=rsiChart.addLineSeries({color:'#7F77DD',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  rsi70=rsiChart.addLineSeries({color:'rgba(226,75,74,0.5)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  rsi30=rsiChart.addLineSeries({color:'rgba(29,158,117,0.5)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});

  macdChart=LightweightCharts.createChart(document.getElementById('macdChart'),subOpts);
  macdHist=macdChart.addHistogramSeries({priceLineVisible:false,lastValueVisible:false});
  macdLine=macdChart.addLineSeries({color:'#378ADD',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  macdSig=macdChart.addLineSeries({color:'#EF9F27',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
}

function initGame(){
  const candles=stockData.candles;
  const total=candles.length;
  const startIdx=Math.floor(total*0.3)+Math.floor(Math.random()*(total*0.4));
  state={candles,startIdx,step:0,totalSteps:10,cash:1000000,shares:0,avgPrice:0,
    trades:[],initCash:1000000,stockName:stockData.name,sector:stockData.sector,
    currency:stockData.currency||'KRW'};
  periodSize=1;
  document.querySelectorAll('#periodBtns .tbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.period)===1));
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('resultModal').classList.remove('show');
  document.getElementById('stockSelectScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';

  buildCharts();

  setTab('buy','qty');setTab('sell','qty');
  clearInputs();updateCharts();updateUI();
}

function getVisible(){
  const end=state.startIdx+state.step*3+25;
  return state.candles.slice(state.startIdx,Math.min(end,state.candles.length));
}
function curPrice(){const v=getVisible();return v[v.length-1].c;}
function fmtPrice(v){return state.currency==='KRW'?'₩'+Math.round(v).toLocaleString():'$'+v.toFixed(2);}

function toTs(dateStr){const[y,m,d]=dateStr.split('-').map(Number);return Date.UTC(y,m-1,d)/1000;}

function aggregateBars(data,period){
  if(period===1)return data.map(d=>({...d,time:toTs(d.date),open:d.o,high:d.h,low:d.l,close:d.c,volume:d.v}));
  const out=[];
  for(let i=0;i<data.length;i+=period){
    const chunk=data.slice(i,Math.min(i+period,data.length));
    if(!chunk.length)continue;
    const last=chunk[chunk.length-1];
    out.push({time:toTs(last.date),open:chunk[0].o,high:Math.max(...chunk.map(d=>d.h)),
      low:Math.min(...chunk.map(d=>d.l)),close:last.c,volume:chunk.reduce((s,d)=>s+d.v,0),
      rsi:last.rsi,ma5:last.ma5,ma20:last.ma20,ma60:last.ma60,
      macd:last.macd,signal:last.signal,hist:last.hist,date:last.date});
  }
  return out;
}

function setPeriod(p){
  periodSize=p;
  document.querySelectorAll('#periodBtns .tbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.period)===p));
  updateCharts();
}
function toggleMA(n){
  maVisible[n]=!maVisible[n];
  document.querySelector(`[data-ma="${n}"]`).classList.toggle('active',maVisible[n]);
  updateCharts();
}

function nn(arr){return arr.filter(d=>d.value!=null&&!isNaN(d.value));}

function updateCharts(){
  if(!candleSeries)return;
  const vis=getVisible();
  const agg=aggregateBars(vis,periodSize);

  candleSeries.setData(agg.map(d=>({time:d.time,open:d.open,high:d.high,low:d.low,close:d.close})));
  ma5Series.setData(maVisible[5]?nn(agg.map(d=>({time:d.time,value:d.ma5}))):[]);
  ma20Series.setData(maVisible[20]?nn(agg.map(d=>({time:d.time,value:d.ma20}))):[]);
  ma60Series.setData(maVisible[60]?nn(agg.map(d=>({time:d.time,value:d.ma60}))):[]);

  volSeries.setData(agg.map(d=>({time:d.time,value:d.volume,color:d.close>=d.open?'rgba(29,158,117,0.7)':'rgba(226,75,74,0.7)'})));

  const rsiData=nn(agg.map(d=>({time:d.time,value:d.rsi})));
  rsiSeries.setData(rsiData);
  if(rsiData.length){
    rsi70.setData(rsiData.map(d=>({time:d.time,value:70})));
    rsi30.setData(rsiData.map(d=>({time:d.time,value:30})));
  }

  macdHist.setData(nn(agg.map(d=>({time:d.time,value:d.hist,color:d.hist>=0?'rgba(29,158,117,0.7)':'rgba(226,75,74,0.7)'}))));
  macdLine.setData(nn(agg.map(d=>({time:d.time,value:d.macd}))));
  macdSig.setData(nn(agg.map(d=>({time:d.time,value:d.signal}))));

  [mainChart,volChart,rsiChart,macdChart].forEach(c=>c.timeScale().fitContent());

  const last=vis[vis.length-1];
  document.getElementById('inf-price').textContent=fmtPrice(last.c);
  document.getElementById('inf-price').style.color=last.c>=last.o?'#1D9E75':'#E24B4A';
  document.getElementById('inf-date').textContent=last.date||'-';
  document.getElementById('inf-h').textContent=fmtPrice(last.h);
  document.getElementById('inf-l').textContent=fmtPrice(last.l);
  document.getElementById('inf-rsi').textContent=last.rsi??'-';
  document.getElementById('inf-ma20').textContent=last.ma20?fmtPrice(last.ma20):'-';
  document.getElementById('inf-avg').textContent=state.avgPrice?fmtPrice(state.avgPrice):'-';
  document.getElementById('inf-shares').textContent=state.shares.toLocaleString()+'주';
  document.getElementById('chartTitle').innerHTML=`${state.sector} — 블라인드 모드 <span class="badge">업종 힌트</span>`;
}

function updateUI(){
  const p=curPrice();
  const total=state.cash+state.shares*p;
  const ret=(total-state.initCash)/state.initCash*100;
  document.getElementById('cashEl').textContent=fmtPrice(state.cash);
  document.getElementById('totalEl').textContent=fmtPrice(total);
  const re=document.getElementById('retEl');
  re.textContent=(ret>=0?'+':'')+ret.toFixed(2)+'%';
  re.className='val '+(ret>0?'up':ret<0?'down':'');
  document.getElementById('progEl').textContent=(state.step+1)+' / '+state.totalSteps;
  refreshOrderSummary('buy');refreshOrderSummary('sell');
  if(ret<=-5){const g=document.getElementById('gw');g.classList.add('shake');setTimeout(()=>g.classList.remove('shake'),400);}
}

function setTab(side,mode){
  orderMode[side]=mode;
  document.getElementById(side+'TabQty').classList.toggle('active',mode==='qty');
  document.getElementById(side+'TabAmt').classList.toggle('active',mode==='amt');
  document.getElementById(side+'Label').textContent=mode==='qty'?'수량':'금액';
  document.getElementById(side+'Unit').textContent=mode==='qty'?'주':'원';
  document.getElementById(side+'Input').value='';
  document.getElementById(side+'Input').step=mode==='qty'?'1':'1000';
  refreshOrderSummary(side);
}
function setPct(side,pct){
  const p=curPrice();
  if(side==='buy'){
    if(orderMode.buy==='qty')document.getElementById('buyInput').value=Math.round(Math.floor(state.cash/p)*pct/100);
    else document.getElementById('buyInput').value=Math.round(state.cash*pct/100/1000)*1000;
  }else{
    if(orderMode.sell==='qty')document.getElementById('sellInput').value=Math.round(state.shares*pct/100);
    else document.getElementById('sellInput').value=Math.round(state.shares*p*pct/100/1000)*1000;
  }
  refreshOrderSummary(side);
}
function onOrderInput(side){refreshOrderSummary(side);}
function refreshOrderSummary(side){
  const p=curPrice();
  const raw=parseFloat(document.getElementById(side+'Input').value)||0;
  let qty=orderMode[side]==='qty'?Math.max(0,Math.floor(raw)):Math.floor(Math.max(0,raw)/p);
  const amt=qty*p;
  if(side==='buy'){
    document.getElementById('buySummaryQty').textContent=qty.toLocaleString()+'주';
    document.getElementById('buySummaryAmt').textContent=fmtPrice(amt);
    const left=state.cash-amt;
    const el=document.getElementById('buySummaryLeft');
    el.textContent=left>=0?fmtPrice(Math.round(left)):'잔액 부족';
    el.style.color=left<0?'#E24B4A':'#e0e0e0';
    document.getElementById('execBuy').disabled=qty<=0||amt>state.cash;
  }else{
    document.getElementById('sellSummaryQty').textContent=qty.toLocaleString()+'주';
    document.getElementById('sellSummaryAmt').textContent=fmtPrice(amt);
    document.getElementById('sellSummaryHolding').textContent=state.shares.toLocaleString()+'주';
    document.getElementById('execSell').disabled=qty<=0||qty>state.shares;
  }
}
function clearInputs(){['buy','sell'].forEach(s=>{document.getElementById(s+'Input').value='';refreshOrderSummary(s);});}
function execOrder(side){
  const p=curPrice();
  const raw=parseFloat(document.getElementById(side+'Input').value)||0;
  let qty=orderMode[side]==='qty'?Math.floor(raw):Math.floor(raw/p);
  if(side==='buy'&&qty>0&&qty*p<=state.cash){
    const cost=qty*p;
    state.avgPrice=state.shares===0?p:(state.avgPrice*state.shares+cost)/(state.shares+qty);
    state.shares+=qty;state.cash-=cost;
    state.trades.push({step:state.step+1,type:'매수',price:p,qty});
    clearInputs();updateUI();
  }else if(side==='sell'&&qty>0&&qty<=state.shares){
    const pnl=Math.round((p-state.avgPrice)*qty);
    state.trades.push({step:state.step+1,type:'매도',price:p,qty,pnl});
    state.cash+=qty*p;state.shares-=qty;
    if(state.shares===0)state.avgPrice=0;
    clearInputs();updateUI();
  }
}
function nextStep(){
  if(state.step>=state.totalSteps-1){showResult();return;}
  state.step++;clearInputs();updateCharts();updateUI();
}
function showResult(){
  const p=curPrice();
  if(state.shares>0){
    state.trades.push({step:state.step+1,type:'매도(청산)',price:p,qty:state.shares,pnl:Math.round((p-state.avgPrice)*state.shares)});
    state.cash+=state.shares*p;state.shares=0;
  }
  const ret=(state.cash-state.initCash)/state.initCash*100;
  let log='<div class="tlog">';
  state.trades.forEach(t=>{log+=`<div>회차 ${t.step}: ${t.type} ${t.qty.toLocaleString()}주 @ ${fmtPrice(t.price)}${t.pnl!==undefined?' / 손익 '+(t.pnl>=0?'+':'')+t.pnl.toLocaleString()+'원':''}</div>`;});
  log+='</div>';
  document.getElementById('modalTitle').textContent='게임 종료';
  document.getElementById('modalBody').innerHTML=
    `<div class="modal-row"><span>종목명</span><span style="font-weight:500">${state.stockName}</span></div>`+
    `<div class="modal-row"><span>최종 자산</span><span style="font-weight:500">${fmtPrice(Math.round(state.cash))}</span></div>`+
    `<div class="modal-row"><span>수익률</span><span style="font-weight:500;color:${ret>=0?'#1D9E75':'#E24B4A'}">${(ret>=0?'+':'')+ret.toFixed(2)}%</span></div>`+
    `<div class="modal-row"><span>총 거래 횟수</span><span>${state.trades.length}회</span></div>`+
    `<div style="margin-top:10px;font-size:11px;color:#666">거래 내역</div>${log}`;
  document.getElementById('resultModal').classList.add('show');
}

init();
</script>
