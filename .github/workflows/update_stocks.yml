name: 주가 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 21 * * 0'  # 매주 일요일 오전 6시 (KST) = UTC 21:00 토요일
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance pandas

      - name: 주가 데이터 수집
        run: python fetch_stock_data.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data/
          git diff --staged --quiet || git commit -m "auto: 주가 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
